<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('overpay.theme');
          document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <meta
      name="description"
      content="Analiză automată a contractelor de microcreditare din Moldova: află dacă ai fost taxat cu dobânzi, comisioane sau clauze nelegale."
    />
    <!-- Self-hosted font subset (latin + latin-ext for ș/ț). Preload primary weight. -->
    <link
      rel="preload"
      href="/fonts/inter-latin-ext-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <title>Verifică-ți contractul de credit</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
